name: Deploy to Staging

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Staging Cluster
        run: |
          az aks create --resource-group sit722-rg --name sit722-aks-staging --node-count 1 --enable-addons monitoring --generate-ssh-keys
          az aks get-credentials --resource-group sit722-rg --name sit722-aks-staging

      - name: Deploy to Staging
        run: kubectl apply -f k8s/

      - name: Smoke Test
        run: kubectl get pods

      - name: Delete Staging Cluster
        if: always()
        run: az aks delete --name sit722-aks-staging --resource-group sit722-rg --yes --no-wait
