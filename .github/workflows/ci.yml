name: CI Pipeline - Build & Push to ACR

on:
  push:
    branches:
      - testing

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install Python (for backend services tests)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Run tests for backend services
      - name: Install dependencies & run tests (customer_service)
        run: |
          cd backend/customer_service
          pip install -r requirements.txt
          pytest || exit 1

      - name: Install dependencies & run tests (order_service)
        run: |
          cd backend/order_service
          pip install -r requirements.txt
          pytest || exit 1

      - name: Install dependencies & run tests (product_service)
        run: |
          cd backend/product_service
          pip install -r requirements.txt
          pytest || exit 1

      # Login to Azure
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Log in to ACR
      - name: Log in to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # Build & push images
      - name: Build & push backend/customer_service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/customer_service:${{ github.sha }} ./backend/customer_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/customer_service:${{ github.sha }}

      - name: Build & push backend/order_service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order_service:${{ github.sha }} ./backend/order_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order_service:${{ github.sha }}

      - name: Build & push backend/product_service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product_service:${{ github.sha }} ./backend/product_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/product_service:${{ github.sha }}

      - name: Build & push frontend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
