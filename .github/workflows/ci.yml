name: CI Pipeline - Stage 1

on:
  push:
    branches:
      - testing

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install deps + run tests for customer_service
      - name: Run tests (customer_service)
        run: |
          cd backend/customer_service
          pip install -r requirements.txt
          pip install pytest
          pytest || exit 1
          cd ../..

      # Install deps + run tests for order_service
      - name: Run tests (order_service)
        run: |
          cd backend/order_service
          pip install -r requirements.txt
          pip install pytest
          pytest || exit 1
          cd ../..

      # Install deps + run tests for product_service
      - name: Run tests (product_service)
        run: |
          cd backend/product_service
          pip install -r requirements.txt
          pip install pytest
          pytest || exit 1
          cd ../..

      # Log in to ACR
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build & push customer_service image
      - name: Build & push customer_service image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/customer_service:latest ./backend/customer_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/customer_service:latest

      # Build & push order_service image
      - name: Build & push order_service image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order_service:latest ./backend/order_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order_service:latest

      # Build & push product_service image
      - name: Build & push product_service image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product_service:latest ./backend/product_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/product_service:latest

      # Build & push frontend image
      - name: Build & push frontend image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest ./frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
