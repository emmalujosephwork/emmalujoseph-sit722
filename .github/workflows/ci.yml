name: CI Pipeline

on:
  push:
    branches:
      - testing   # Only trigger on 'testing' branch
  pull_request:
    branches:
      - main

jobs:
  # -------------------
  # Stage 1: Run Tests
  # -------------------
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Create databases for services
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -c "CREATE DATABASE customers;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -c "CREATE DATABASE orders;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -c "CREATE DATABASE products;"

      # Customer Service
      - name: Install dependencies (customer_service)
        run: pip install -r backend/customer_service/requirements-dev.txt

      - name: Run tests (customer_service)
        working-directory: backend/customer_service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customers
        run: pytest -v --disable-warnings

      # Order Service
      - name: Install dependencies (order_service)
        run: pip install -r backend/order_service/requirements-dev.txt

      - name: Run tests (order_service)
        working-directory: backend/order_service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orders
        run: pytest -v --disable-warnings

      # Product Service
      - name: Install dependencies (product_service)
        run: pip install -r backend/product_service/requirements-dev.txt

      - name: Run tests (product_service)
        working-directory: backend/product_service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/products
        run: pytest -v --disable-warnings

  # -------------------
  # Stage 2: Build & Push Images (only if tests pass)
  # -------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test   # ✅ Run only if test job passes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build & Push Customer Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/customer_service:latest ./backend/customer_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/customer_service:latest

      - name: Build & Push Order Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order_service:latest ./backend/order_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order_service:latest

      - name: Build & Push Product Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product_service:latest ./backend/product_service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/product_service:latest
