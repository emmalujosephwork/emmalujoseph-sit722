name: CI Pipeline

on:
  push:
    branches:
      - testing

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: python -m pip install --upgrade pip

      - name: Create DBs
        run: |
          sudo apt-get install -y postgresql-client
          for db in customers orders products; do
            PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -c "CREATE DATABASE $db;"
          done

      - name: Install & Test (customer_service)
        run: |
          pip install -r backend/customer_service/requirements-dev.txt
          cd backend/customer_service && pytest -v --disable-warnings
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/customers

      - name: Install & Test (order_service)
        run: |
          pip install -r backend/order_service/requirements-dev.txt
          cd backend/order_service && pytest -v --disable-warnings
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orders

      - name: Install & Test (product_service)
        run: |
          pip install -r backend/product_service/requirements-dev.txt
          cd backend/product_service && pytest -v --disable-warnings
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/products

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        uses: azure/docker-login@v1
        with:
          login-server: sit722acremmalu.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Customer Service
        run: |
          docker build -t sit722acremmalu.azurecr.io/customer_service:latest ./backend/customer_service
          docker push sit722acremmalu.azurecr.io/customer_service:latest

      - name: Build & Push Order Service
        run: |
          docker build -t sit722acremmalu.azurecr.io/order_service:latest ./backend/order_service
          docker push sit722acremmalu.azurecr.io/order_service:latest

      - name: Build & Push Product Service
        run: |
          docker build -t sit722acremmalu.azurecr.io/product_service:latest ./backend/product_service
          docker push sit722acremmalu.azurecr.io/product_service:latest

      - name: Build & Push Frontend
        run: |
          docker build -t sit722acremmalu.azurecr.io/frontend:latest ./frontend
          docker push sit722acremmalu.azurecr.io/frontend:latest

  staging-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Staging Resources
        run: |
          az group create --name sit722-staging-rg --location australiaeast
          az aks create --resource-group sit722-staging-rg --name sit722StagingCluster \
            --node-count 1 --node-vm-size Standard_B2s --enable-managed-identity --generate-ssh-keys
          az aks get-credentials --resource-group sit722-staging-rg --name sit722StagingCluster
          az aks update -n sit722StagingCluster -g sit722-staging-rg --attach-acr sit722acremmalu

      - name: Deploy Services to Staging
        run: |
          kubectl create namespace staging || true
          kubectl apply -f k8s/ -n staging

      - name: Run Acceptance Tests
        run: |
          kubectl rollout status deployment/customer-deployment -n staging --timeout=120s
          kubectl rollout status deployment/order-deployment -n staging --timeout=120s
          kubectl rollout status deployment/product-deployment -n staging --timeout=120s
          kubectl rollout status deployment/frontend-deployment -n staging --timeout=120s
          kubectl get pods -n staging

      - name: Destroy Staging Environment
        if: always()
        run: |
          az group delete --name sit722-staging-rg --yes --no-wait
