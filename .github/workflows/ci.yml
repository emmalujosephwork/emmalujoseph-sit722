name: CI Pipeline

on:
  push:
    branches:
      - testing   # Trigger only when pushing to 'testing' branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [customer_service, order_service, product_service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies & run tests (${{ matrix.service }})
        run: |
          cd backend/${{ matrix.service }}
          # Install production dependencies
          pip install -r requirements.txt
          # Install dev/test dependencies (pytest, httpx, etc.)
          pip install -r requirements-dev.txt
          # Run pytest
          pytest || exit 1
          cd ../..

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push images
        run: |
          # Backend services
          for service in customer_service order_service product_service; do
            IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/$service:latest
            docker build -t $IMAGE_NAME ./backend/$service
            docker push $IMAGE_NAME
          done

          # Frontend
          IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          docker build -t $IMAGE_NAME ./frontend
          docker push $IMAGE_NAME
